<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>mydev.bychat.io</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-layout">
    <!-- Top status bar -->
    <div class="status-bar" id="status-bar">
      <div class="status-bar-left">
        <span class="status-app-name">mydev.bychat.io</span>
        <span class="status-badge" id="badge-git" style="display:none;">
          <svg class="status-icon" viewBox="0 0 16 16" width="14" height="14" fill="currentColor">
            <path d="M15.698 7.287L8.712.302a1.03 1.03 0 0 0-1.457 0l-1.45 1.45 1.84 1.84a1.223 1.223 0 0 1 1.548 1.56l1.773 1.774a1.224 1.224 0 1 1-.733.68L8.535 5.91v4.245a1.224 1.224 0 1 1-1.008-.036V5.793a1.224 1.224 0 0 1-.665-1.605L5.042 2.368.302 7.108a1.03 1.03 0 0 0 0 1.457l6.986 6.986a1.03 1.03 0 0 0 1.457 0l6.953-6.953a1.031 1.031 0 0 0 0-1.457"/>
          </svg>
          Git
        </span>
        <span class="status-badge status-badge--npm" id="badge-npm" style="display:none;">
          <svg class="status-icon" viewBox="0 0 16 16" width="14" height="14" fill="currentColor">
            <path d="M0 0v16h16V0H0zm13 13h-2V5H8v8H3V3h10v10z"/>
          </svg>
          <span id="badge-npm-name">npm</span>
        </span>
      </div>
      <div class="status-bar-right">
        <span class="status-path" id="status-path"></span>
      </div>
    </div>

    <!-- Sidebar: file tree -->
    <div class="app-body">
      <!-- Chat panel (far left) -->
      <!-- File tree sidebar (far left) -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <h2>� Explorer</h2>
        </div>
        <div class="sidebar-actions">
          <button id="import-btn" class="btn-import">📂 Import Folder</button>
        </div>
        <div id="folder-name" class="folder-name" style="display:none;"></div>
        <div id="file-tree" class="file-tree"></div>
      </aside>

      <!-- Editor area (center) -->
      <main class="main-content">
        <!-- Tab bar -->
        <div class="editor-tabs" id="editor-tabs" style="display:none;"></div>

        <!-- Editor -->
        <div class="editor-wrapper" id="editor-wrapper" style="display:none;">
          <div class="editor-toolbar">
            <span class="editor-filepath" id="editor-filepath"></span>
            <div class="editor-toolbar-right">
              <span class="editor-status" id="editor-status"></span>
              <button class="btn-save" id="btn-save" title="Save (⌘S)">💾 Save</button>
            </div>
          </div>
          <div class="editor-line-numbers" id="editor-line-numbers"></div>
          <textarea class="editor-textarea" id="editor-textarea" spellcheck="false"></textarea>
        </div>

        <!-- Welcome screen -->
        <div class="card" id="get-started-card">
          <div class="welcome-center">
            <h1>mydev.bychat.io</h1>
            <p class="subtitle">Import a folder to get started</p>
            <button id="import-btn-main" class="btn-primary">📂 Import a Project</button>
          </div>
        </div>
      </main>

      <!-- Chat panel (far right) -->
      <section class="chat-panel" id="chat-panel">
        <div class="chat-header">
          <h2>� Chat</h2>
        </div>
        <div class="chat-messages" id="chat-messages">
          <div class="chat-welcome">
            <span class="chat-welcome-icon">🤖</span>
            <p>Hi! How can I help you with your project?</p>
          </div>
        </div>
        <div class="chat-input-area">
          <textarea id="chat-input" class="chat-input" placeholder="Type a message…" rows="1"></textarea>
          <button id="chat-send-btn" class="chat-send-btn">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
      </section>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
