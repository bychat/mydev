name: Publish CLI to npm

# Triggers:
#   1. Push a version tag like v1.0.0, v2.3.1-beta.0, etc.
#   2. Manual dispatch from the Actions tab (with optional tag override).
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run without actually publishing (npm publish --dry-run)'
        required: false
        default: false
        type: boolean

# ── Permissions ─────────────────────────────────────────────────
permissions:
  contents: read        # checkout
  id-token: write       # npm provenance (optional, for supply-chain security)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # ── Checkout ────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Node.js + npm registry auth ─────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      # ── Install deps (skip Electron postinstall) ────────────────
      - name: Install dependencies
        run: npm ci --ignore-scripts

      # ── Build CLI ───────────────────────────────────────────────
      - name: Build CLI
        run: npm run build:cli

      # ── Verify the CLI binary runs ──────────────────────────────
      - name: Smoke test
        run: node dist-cli/cli/index.js --version

      # ── Publish to npm ──────────────────────────────────────────
      - name: Publish
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            npm publish --access public --dry-run
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
