name: Publish to npm

# Triggers:
#   1. Push a version tag like v1.0.0, v2.3.1-beta.0, etc.
#   2. Manual dispatch from the Actions tab.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run without actually publishing (npm publish --dry-run)'
        required: false
        default: false
        type: boolean
      package:
        description: 'Which package to publish'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - flovia
          - flovia-cli

# ── Permissions ─────────────────────────────────────────────────
permissions:
  contents: read
  id-token: write       # npm provenance

jobs:
  # ── Build & Publish ───────────────────────────────────────────
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build CLI
        run: npm run build:cli

      - name: Stage packages
        run: bash scripts/stage-packages.sh

      - name: Smoke test (flovia-cli)
        run: node packages/flovia-cli/dist-cli/cli/index.js --version

      - name: Smoke test (flovia launcher)
        run: node packages/flovia/bin/launch.js --help

      # Sync version from tag into both package.json files
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Publishing version: $VERSION"
          cd packages/flovia     && npm version "$VERSION" --no-git-tag-version && cd ../..
          cd packages/flovia-cli && npm version "$VERSION" --no-git-tag-version && cd ../..

      # ── Publish flovia (desktop launcher) ─────────────────────
      - name: Publish flovia
        if: inputs.package == 'both' || inputs.package == 'flovia' || startsWith(github.ref, 'refs/tags/v')
        working-directory: packages/flovia
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            npm publish --access public --dry-run
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Publish flovia-cli ────────────────────────────────────
      - name: Publish flovia-cli
        if: inputs.package == 'both' || inputs.package == 'flovia-cli' || startsWith(github.ref, 'refs/tags/v')
        working-directory: packages/flovia-cli
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            npm publish --access public --dry-run
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
