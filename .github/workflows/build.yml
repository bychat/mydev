name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ── Quick build check ────────────────────────────────────────
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile check (main process)
        run: npx tsc --noEmit

      - name: Build renderer (Vite)
        run: npx vite build

  # ── macOS build (universal – Intel + Apple Silicon) ───────────
  build-mac:
    needs: check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Python setuptools (provides distutils for node-gyp)
        run: pip3 install --break-system-packages setuptools

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild

      - name: Build macOS DMG (universal)
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'   # skip code-signing in CI

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mydev-mac
          path: dist/*.dmg
          if-no-files-found: error
          retention-days: 0
          # 2 hour retention — GitHub rounds up to nearest day minimum,
          # but the intent is short-lived artifacts for testing.

  # ── Windows build (x64 .exe installer) ───────────────────────
  build-win:
    needs: check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Python setuptools (provides distutils for node-gyp)
        run: pip install setuptools

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild

      - name: Build Windows installer
        run: npm run build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mydev-win-x64
          path: dist/*.exe
          if-no-files-found: error
          retention-days: 0

  # ── Linux build (x64 AppImage) ───────────────────────────────
  build-linux:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Python setuptools (provides distutils for node-gyp)
        run: pip3 install --break-system-packages setuptools

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild

      - name: Build Linux AppImage
        run: npm run build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mydev-linux-x64
          path: dist/*.AppImage
          if-no-files-found: error
          retention-days: 0
